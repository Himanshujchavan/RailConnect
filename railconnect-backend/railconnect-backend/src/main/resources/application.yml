spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/railconnect
    username: postgres
    password: 12345678
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # --- WE INTEGRATED THE MAIL BLOCK UNDER THE EXISTING 'SPRING' BLOCK ---
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

application:
  name: RailConnect
server:
  port: 8080
logging:
  level:
    org.hibernate.SQL: DEBUG

