spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/railconnect
    username: postgres
    password: 12345678
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
application:
  name: RailConnect
server:
  port: 8080
railconnect:
  jwt:
    # Local-dev only. Override with an environment variable (RAILCONNECT_JWT_SECRET)
    # before this ever runs anywhere but your own machine.
    secret: ${RAILCONNECT_JWT_SECRET:this-is-a-local-dev-only-secret-key-replace-me-before-deploying-32B+}
logging:
  level:
    org.hibernate.SQL: DEBUG
